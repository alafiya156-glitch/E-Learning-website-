<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - EduSite</title>
<link rel="stylesheet" href="style.css">
<style>
/* hero background image + overlay */
.login-container {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background:
    linear-gradient(135deg, rgba(79,209,197,0.85), rgba(108,76,255,0.88)),
    url('https://images.unsplash.com/photo-1571260899304-425eee4c7efc?w=1600&q=80') center/cover no-repeat;
  position: relative;
  overflow: hidden;
}
 
/* floating decorative circle (pseudo-element) */
.login-container::before {
  content: '';
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.08);
  top: -100px;
  left: -100px;
  pointer-events: none;
  animation: floatShape 7s ease-in-out infinite;
}
 
.login-container::after {
  content: '';
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  bottom: 40px;
  right: 10%;
  animation: floatShape 9s ease-in-out infinite reverse;
}
 
/* glassmorphism card */
.login-box {
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  padding: 45px 40px;
  width: 370px;
  border-radius: 22px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.4);
  text-align: center;
  animation: fadeInUp 0.7s ease both;
  position: relative;
  z-index: 10;
}
 
/* coloured top accent bar */
.login-box::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  border-radius: 22px 22px 0 0;
  background: linear-gradient(90deg, #6c4cff, #4fd1c5);
}
 
.login-box h2 {
  margin-bottom: 6px;
  color: var(--primary);
  font-size: 24px;
  letter-spacing: 0.5px;
  text-shadow: 0 2px 8px rgba(108,76,255,0.15);
}
 
.login-box .subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 22px;
}
 
.login-box .field-label {
  display: block;
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.7px;
  margin: 14px 0 4px;
}
 
.login-box input {
  width: 100%;
  padding: 12px 15px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: #f8f6ff;
  font-size: 14px;
  transition: border-color 0.3s, box-shadow 0.3s;
}
 
.login-box input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(108,76,255,0.12);
  outline: none;
}
 
.login-box button {
  width: 100%;
  padding: 13px;
  margin-top: 22px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #6c4cff, #4fd1c5);
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: transform 0.25s, box-shadow 0.25s;
  box-shadow: 0 6px 20px rgba(108,76,255,0.35);
}
 
.login-box button:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 12px 30px rgba(108,76,255,0.45);
}
 
.login-box button:active {
  transform: scale(0.98);
}
 
.login-box .bottom-text {
  margin-top: 18px;
  font-size: 13px;
  color: var(--muted);
}
 
.login-box a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
}
 
.login-box a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<header class="navbar">
  <h2>EduSite</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="courses_frame.html">Courses</a>
    <a href="contact.html">Contact</a>
    <a href="login.html">Login</a>
    <a href="certificate.html">Certificate</a>
  </nav>
</header>
 
<div class="login-container">
  <div class="login-box">
    <h2>Welcome Back 👋</h2>
    <p class="subtitle">Sign in to continue learning</p>
    <form>
      <label class="field-label">Email address</label>
      <input type="email" placeholder="you@example.com" required>
      <label class="field-label">Password</label>
      <input type="password" placeholder="••••••••" required>
      <button type="submit">Login</button>
    </form>
    <p class="bottom-text">New Student? <a href="#">Create Account</a></p>
  </div>
</div>
</body>
</html>
