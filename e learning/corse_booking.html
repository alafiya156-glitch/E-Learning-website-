<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Learn | Course Enrollment</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#6c4cff,#4fd1c5);
    min-height:100vh;
}

/* NAVBAR */

header{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:18px 50px;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.brand{
    color:white;
    font-size:30px;
    font-weight:bold;
    text-decoration:none;
}

.nav-links{
    display:flex;
    list-style:none;
    gap:25px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-size:17px;
}

.nav-links a:hover{
    color:yellow;
}

/* COURSE IMAGE SECTION */

.course-section{
    text-align:center;
    padding:40px 20px;
}

.course-section h1{
    color:white;
    font-size:45px;
    margin-bottom:25px;
}

.course-card{
    width:320px;
    margin:auto;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    transition:0.3s;
    cursor:pointer;
}

.course-card:hover{
    transform:scale(1.05);
}

.course-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.course-card h2{
    padding:20px;
    color:#6c4cff;
}

/* FORM SECTION */

.form-container{
    display:none;
    width:100%;
    max-width:850px;
    margin:40px auto;
    padding:20px;
}

.form-card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 35px rgba(0,0,0,0.2);
}

.section-title{
    text-align:center;
    color:white;
    font-size:40px;
    margin-bottom:20px;
}

.grid-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

input,
select{
    width:100%;
    padding:14px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

input:focus,
select:focus{
    border-color:#6c4cff;
    outline:none;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#6c4cff,#4fd1c5);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.btn:hover{
    opacity:0.9;
}

.message{
    margin-top:20px;
    padding:15px;
    background:#d4edda;
    color:#155724;
    border-radius:10px;
    text-align:center;
    display:none;
}

/* FOOTER */

footer{
    text-align:center;
    padding:18px;
    background:rgba(0,0,0,0.2);
    color:white;
    margin-top:40px;
}

/* RESPONSIVE */

@media(max-width:768px){

.grid-2{
    grid-template-columns:1fr;
}

.navbar{
    flex-direction:column;
    gap:15px;
}

.nav-links{
    flex-wrap:wrap;
    justify-content:center;
}

}

</style>
</head>

<body>

<header>

<nav class="navbar">

<a class="brand" href="#">E-Learn</a>

<ul class="nav-links">
<li><a href="#">Home</a></li>
<li><a href="#">Courses</a></li>
<li><a href="#">Enroll</a></li>
<li><a href="#">Login</a></li>
<li><a href="#">Contact</a></li>
</ul>

</nav>

</header>

<!-- IMAGE SECTION -->

<section class="course-section">

<h1>Book Your Course</h1>

<div class="course-card" onclick="showForm()">

<img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200"
alt="Course Image">

<h2>Click Here to Enroll</h2>

</div>

</section>

<!-- FORM SECTION -->

<div class="form-container" id="formContainer">

<h1 class="section-title">Enroll in Course</h1>

<div class="form-card">

<form id="courseForm">

<div class="grid-2">

<div>
<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your name" required>
</div>

<div>
<label>Email Address</label>
<input type="email" id="email" placeholder="Enter your email" required>
</div>

</div>

<div class="grid-2">

<div>

<label>Select Course</label>

<select id="course" required>

<option value="">Choose Course</option>
<option>HTML Foundations</option>
<option>CSS Mastery</option>
<option>JavaScript Essentials</option>
<option>Machine Learning Basics</option>

</select>

</div>

<div>

<label>Learning Mode</label>

<select required>

<option value="">Select Mode</option>
<option>Self-Paced</option>
<option>Instructor-Led</option>

</select>

</div>

</div>

<div class="grid-2">

<div>
<label>Start Date</label>
<input type="date" required>
</div>

<div>

<label>Duration</label>

<select required>

<option value="">Select Duration</option>
<option>2 Weeks</option>
<option>1 Month</option>
<option>3 Months</option>

</select>

</div>

</div>

<div>

<label>Payment Type</label>

<select required>

<option value="">Select Payment</option>
<option>Free Course</option>
<option>UPI</option>
<option>Debit/Credit Card</option>

</select>

</div>

<button class="btn" type="submit">
Confirm Enrollment
</button>

<p id="msg" class="message"></p>

</form>

</div>

</div>

<footer>

<p>
© 2026 E-learn. All Rights Reserved.
</p>

</footer>

<script>

function showForm(){

document.getElementById("formContainer").style.display = "block";

window.scrollTo({
top:700,
behavior:"smooth"
});

}

const form = document.getElementById("courseForm");
const msg = document.getElementById("msg");

form.addEventListener("submit", function(e){

e.preventDefault();

const name = document.getElementById("name").value;
const course = document.getElementById("course").value;

msg.style.display = "block";

msg.innerHTML =
"Success! " + name + ", you have enrolled in " + course;

form.reset();

});

</script>

</body>
</html>
